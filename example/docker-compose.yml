# docker-compose --profile loki up
# docker-compose --profile mysql up

services:
  alertsnitch:
    image: mikehsu0618/alertsnitch:latest
    ports:
      - "9567:9567"
    env_file:
      - .env
    environment:
      ALERTSNITCH_DEBUG: true
      ALERTSNITCH_BACKEND_ENDPOINT: "${ALERTSNITCH_BACKEND_ENDPOINT}"
      ALERTSNITCH_BACKEND: "${ALERTSNITCH_BACKEND}"
      ALERTSNITCH_LOKI_TENANT_ID: "${ALERTSNITCH_LOKI_TENANT_ID}"
      ALERTSNITCH_LOKI_BASIC_AUTH_USER: "${ALERTSNITCH_LOKI_BASIC_AUTH_USER}"
      ALERTSNITCH_LOKI_BASIC_AUTH_PASSWORD: "${ALERTSNITCH_LOKI_BASIC_AUTH_PASSWORD}"
      # TLS configuration
      ALERTSNITCH_LOKI_TLS_INSECURE_SKIP_VERIFY: "${ALERTSNITCH_LOKI_TLS_INSECURE_SKIP_VERIFY:-false}"
      ALERTSNITCH_LOKI_TLS_CA_CERT_PATH: "${ALERTSNITCH_LOKI_TLS_CA_CERT_PATH:-}"
      ALERTSNITCH_LOKI_TLS_CLIENT_CERT_PATH: "${ALERTSNITCH_LOKI_TLS_CLIENT_CERT_PATH:-}"
      ALERTSNITCH_LOKI_TLS_CLIENT_KEY_PATH: "${ALERTSNITCH_LOKI_TLS_CLIENT_KEY_PATH:-}"
      # Batch configuration
      ALERTSNITCH_LOKI_BATCH_ENABLED: "${ALERTSNITCH_LOKI_BATCH_ENABLED:-true}"
      ALERTSNITCH_LOKI_BATCH_SIZE: "${ALERTSNITCH_LOKI_BATCH_SIZE:-100}"
      ALERTSNITCH_LOKI_BATCH_FLUSH_TIMEOUT: "${ALERTSNITCH_LOKI_BATCH_FLUSH_TIMEOUT:-5s}"
      ALERTSNITCH_LOKI_BATCH_MAX_RETRIES: "${ALERTSNITCH_LOKI_BATCH_MAX_RETRIES:-3}"
      # Allowed labels configuration
      ALERTSNITCH_LOKI_ALLOWED_LABELS: "${ALERTSNITCH_LOKI_ALLOWED_LABELS:-}"
      # Proxy configuration (Prometheus style - uses standard environment variables)
      HTTP_PROXY: "${HTTP_PROXY:-}"
      HTTPS_PROXY: "${HTTPS_PROXY:-}"
      NO_PROXY: "${NO_PROXY:-}"
    depends_on:
      - "${ALERTSNITCH_BACKEND}"
    profiles:
      - loki
      - mysql

  loki:
    image: grafana/loki:3.6.3
    container_name: loki
    ports:
      - "3100:3100"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3100/ready || exit 1"]
      interval: 3s
      timeout: 5s
      retries: 10
      start_period: 5s
    profiles:
      - loki

  grafana:
    image: grafana/grafana:12.3.1
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_INSTALL_PLUGINS=https://github.com/MikeHsu0618/alertsnitch/raw/master/example/grafana/plugins/grafana-alertsnitch-app-1.0.0.zip;grafana-alertsnitch-app
      - GF_PLUGINS_ALLOW_LOADING_UNSIGNED_PLUGINS=grafana-alertsnitch-app
    volumes:
      - ./grafana/configs:/etc/grafana/provisioning
      - ./grafana/dashboards:/etc/grafana/dashboards
    profiles:
      - loki
      - mysql
  holmesgpt:
    image: mikehsu0618/holmesgpt:latest
    container_name: holmesgpt
    ports:
      - "${HOLMES_PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      - HOLMES_HOST=0.0.0.0
      - HOLMES_PORT=8000
      - LOKI_URL=http://loki:3100
      - LOKI_TENANT_ID=fake
      - CORS_ENABLED=true
    volumes:
      - ./holmesgpt/config.yaml:/app/config.yaml:ro
      - ./examples:/app/examples:ro
    entrypoint: ["python", "server.py"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    profiles:
      - loki

  holmesgpt-agui:
    image: mikehsu0618/holmesgpt:latest
    container_name: holmesgpt-agui
    ports:
      - "${HOLMES_AGUI_PORT:-5050}:5050"
    env_file:
      - .env
    environment:
      - HOLMES_HOST=0.0.0.0
      - HOLMES_PORT=5050
      - LOKI_URL=http://loki:3100
      - LOKI_TENANT_ID=fake
      - CORS_ENABLED=true
    volumes:
      - ./holmesgpt/config.yaml:/app/config.yaml:ro
      - ./examples:/app/examples:ro
    entrypoint: ["python", "experimental/ag-ui/server-agui.py"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5050/api/agui/chat/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    profiles:
      - loki

  prometheus:
    image: prom/prometheus:v3.8.1
    container_name: prometheus
    ports:
      - "9090:9090"
    profiles:
      - loki

  mysqldb:
    restart: always
    image: mysql:8.4
    command: --default-authentication-plugin=mysql_native_password
    volumes:
      - ./database/mysql:/docker-entrypoint-initdb.d
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: alertsnitch
      MYSQL_USER: "alertsnitch"
      MYSQL_PASSWORD: "alertsnitch"
      MYSQL_ROOT_PASSWORD: "root"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      timeout: 20s
      retries: 10
    profiles:
      - mysql
